site_name: browser-forensic
site_url: https://securityronin.github.io/browser-forensic/
repo_url: https://github.com/SecurityRonin/browser-forensic
repo_name: SecurityRonin/browser-forensic
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Product Requirements: prd.md
  - Migrating to v2 (command surface): migration-v2.md
  - Decryption validation: validation.md
  - Decisions:
      - Layered multi-crate workspace: decisions/0001-layered-multi-crate-workspace.md
      - One normalized BrowserEvent schema: decisions/0002-normalized-browserevent-schema.md
      - Two-track SQLite access: decisions/0003-two-track-sqlite-access.md
      - Reuse leveldb-forensic for web storage: decisions/0004-reuse-leveldb-forensic-for-web-storage.md
      - Knowledge-as-code via forensicnomicon: decisions/0005-knowledge-as-code-forensicnomicon.md
      - Capable by default: decisions/0006-capable-by-default-no-feature-gating.md
      - Panic-free, fuzzed parsing: decisions/0007-panic-free-fuzzed-parsing.md
      - Structural signature sweep: decisions/0008-structural-signature-sweep-for-containers.md
      - Clean-room Hindsight interpretation: decisions/0009-clean-room-hindsight-interpretation.md
      - Dual-mode CLI and TUI binary: decisions/0010-dual-mode-cli-tui-binary.md
      - Secret-free, redacted MCP bridge: decisions/0011-secret-free-redacted-mcp-bridge.md
  - Privacy Policy: privacy.md
  - Terms of Service: terms.md

plugins:
  - search

# Directory URLs (/privacy/, /terms/) — matches the SecurityRonin README footer
# standard (…/<repo>/privacy/). Flat .html URLs would 404 the footer links.
use_directory_urls: true
