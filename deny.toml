[graph]
targets = []

[advisories]
version = 2
# Interim: quick-xml < 0.41 DoS advisories (quadratic attr check / unbounded
# namespace allocation). Reached only transitively via `plist` 1.9, which pins
# `quick-xml = "^0.39"` — so the tree cannot bump to 0.41 until `plist` releases.
# Both are denial-of-service (resource exhaustion in XML parsing), not memory
# unsafety/RCE. Drop these once `plist` widens its quick-xml requirement.
ignore = [
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "OpenSSL",
    "Zlib",
    "BSL-1.0",
    "MPL-2.0",
    # webpki-roots (Mozilla CA bundle) relicensed to CDLA-Permissive-2.0 at 1.0.
    # Pulled transitively by `ureq` under `memf-symbols` (kernel-PDB fetch). A
    # permissive data license with no copyleft or patent traps.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
