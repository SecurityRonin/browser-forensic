name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@9bdad043e88c75890e36ad3bbc8d27f0090dd609 # v2

      - run: cargo install cargo-llvm-cov --locked

      # Regression backstop at 89.4% lines (actual 89.47%). The uncovered remainder
      # is now ONLY the irreducible imperative shell of the three binaries, after the
      # Humble-Object pass pulled every decision into unit-tested lib fns:
      #   * browser-tui/src/tui.rs — the terminal.draw / event::read render+event loop
      #     and the open/clipboard/fs side effects (key→Action, state transitions,
      #     view-model, and effect-outcome→status formatting are all in browser_tui lib);
      #   * browsing-state-mcp/src/main.rs — the stdin/stdout JSON-RPC loop (routing in
      #     server::dispatch, env policy in context::parse_allowlist, both lib-tested);
      #   * bw-cli/src/main.rs — clap parsing, parser I/O, and the println! loops
      #     (carve-stat merge, triage summary, filename inference are in the bw_cli lib).
      # These call draw/read/transport/print directly and cannot be unit-tested without
      # mocking the terminal/stdio; the integration tests exercise them end-to-end.
      # Raise this number as coverage improves; never lower it silently.
      - run: cargo llvm-cov --workspace --summary-only --fail-under-lines 89.4
