[workspace]
members = [
    "crates/browser-core",
    "crates/browser-chrome",
    "crates/browser-firefox",
    "crates/browser-safari",
    "crates/bw-cli",
    "crates/browser-discovery",
    "crates/browser-integrity",
    "crates/browser-carve",
    "crates/browser-memory",
    "crates/browser-rt",
    "crates/snss-core",
    "crates/browser-tui",
    "crates/browsing-state-mcp",
]
resolver = "2"

[workspace.package]
edition = "2021"
rust-version = "1.80"
license = "Apache-2.0"

[workspace.dependencies]
anyhow = "1"
dirs = "6"
lz4_flex = "0.11"
plist = "1"
url = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.32", features = ["bundled"] }
sha2 = "0.10"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
assert_cmd = "2"
tempfile = "3"
forensicnomicon = { version = "0.3.1", features = ["serde"] }
thiserror = "2"

[workspace.lints.rust]
# Forbid unsafe across the suite — these crates parse untrusted browser artifacts;
# the code is unsafe-free and stays that way (Paranoid Gatekeeper). Earns the
# `unsafe-forbidden` README badge.
unsafe_code = "forbid"
unused_imports = "warn"
unused_variables = "warn"

[workspace.lints.clippy]
all = "warn"
