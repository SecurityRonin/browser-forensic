[package]
name = "browser-forensic-webcache"
version = "0.2.0"
description = "IE / Edge-Legacy WebCacheV01.dat (ESE) browser artifact parser"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
anyhow = { workspace = true }
browser-forensic-core = { version = "0.2.0", path = "../browser-forensic-core" }
serde_json = { workspace = true }
# ESE reading is owned by the fleet `ese-core` crate — this crate NEVER parses
# ESE itself. Pinned to the ese-forensic git revision that reads a real large-page
# WebCacheV01.dat: large-page tag masks + 40-byte extended page header, real
# MSysObjects per-table columns, and tagged-column (id >= 256) record decoding.
ese-core = "0.2"

[dev-dependencies]
tempfile = { workspace = true }
# Dev-only ESE fixture builder from the same git source (never ships).
ese-test-fixtures = { git = "https://github.com/SecurityRonin/ese-forensic.git", rev = "7a5690f144fb5bd83e7a3c9b15f24cd54cdcd413" }

[lints]
workspace = true
