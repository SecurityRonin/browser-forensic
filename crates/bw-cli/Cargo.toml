[package]
name = "bw-cli"
version = "0.1.0"
description = "bw — command-line browser forensic analysis tool for history, carving, integrity, and triage"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
[lib]
name = "bw_cli"
path = "src/lib.rs"

[[bin]]
name = "bw"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true }
browser-core = { version = "0.1.0", path = "../browser-core" }
browser-chrome = { version = "0.1.0", path = "../browser-chrome" }
browser-firefox = { version = "0.1.0", path = "../browser-firefox" }
browser-safari = { version = "0.1.0", path = "../browser-safari" }
browser-discovery = { version = "0.1.0", path = "../browser-discovery" }
browser-integrity = { version = "0.1.0", path = "../browser-integrity" }
browser-carve = { version = "0.1.0", path = "../browser-carve" }
browser-rt = { version = "0.1.0", path = "../browser-rt" }
clap = { workspace = true }
chrono = { workspace = true }
dirs = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }
rusqlite = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }

[lints]
workspace = true
