[package]
name = "browser-tui"
version = "0.1.0"
description = "br4n6 — a Midnight-Commander-style, vi-keyed terminal browser for on-disk browser history and session state"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
name = "browser_tui"
path = "src/lib.rs"

[[bin]]
name = "br4n6"
path = "src/main.rs"

[dependencies]
snss-core = { path = "../snss-core" }
ratatui = "0.30"
crossterm = "0.29"
arboard = "3.6"
open = "5"

[lints]
workspace = true
