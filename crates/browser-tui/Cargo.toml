[package]
name = "browser-tui"
version = "0.1.0"
description = "br4n6 — a Midnight-Commander-style, vi-keyed terminal browser for on-disk browser history and session state"
edition.workspace = true
rust-version.workspace = true
license.workspace = true

[lib]
name = "browser_tui"
path = "src/lib.rs"

[[bin]]
name = "br4n6"
path = "src/main.rs"

[dependencies]
snss-core = { version = "0.1.0", path = "../snss-core" }
browser-core = { version = "0.1.0", path = "../browser-core" }
browser-chrome = { version = "0.1.0", path = "../browser-chrome" }
browser-firefox = { version = "0.1.0", path = "../browser-firefox" }
browser-safari = { version = "0.1.0", path = "../browser-safari" }
browser-discovery = { version = "0.1.0", path = "../browser-discovery" }
ratatui = "0.30"
crossterm = "0.29"
arboard = "3.6"
open = "5"
anyhow = { workspace = true }
clap = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
dirs = { workspace = true }

[dev-dependencies]
assert_cmd = { workspace = true }
rusqlite = { workspace = true }
tempfile = { workspace = true }
lz4_flex = { workspace = true }

[lints]
workspace = true
